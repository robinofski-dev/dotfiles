"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

format = """
[Óā∂](mauve)$directory[Óāī ](mauve)\
$git_branch$git_status\
$nodejs\
$username\
$line_break$character
"""

palette = "catppuccin_mocha"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

[directory]
style = "bg:mauve fg:base bold"
truncation_length = 3
truncate_to_repo = true
format = "[ $path ]($style)"
home_symbol = "~"

[character]
success_symbol = "[‚ěú](bold mauve)"
error_symbol = "[‚ěú](bold red)"
vimcmd_symbol = "[‚ěú](bold green)"

[git_branch]
symbol = "Ôźė "
style = "bold peach"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold yellow"
format = '([$all_status$ahead_behind]($style) )'

[nodejs]
symbol = "Óúė "
style = "bold green"
format = "[$symbol($version )]($style)"

[username]
show_always = false
format = "[$user](bold blue) "